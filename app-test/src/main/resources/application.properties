# App name
spring.application.name=app_test

# Sever port
server.port=8080

# Context path
server.servlet.context-path=/app_test

# Spring Data Source mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/db7
spring.datasource.username=db7
spring.datasource.password=1234

# Spring Data Source mariadb
#spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
#spring.datasource.url=jdbc:mariadb://localhost:3306/db7
#spring.datasource.username=db7
#spring.datasource.password=1234

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# thymeleaf
spring.thymeleaf.cache=false

# File upload setting for Servlet
spring.servlet.multipart.enabled=true
spring.servlet.multipart.location=C:\\upload
spring.servlet.multipart.max-request-size=30MB
spring.servlet.multipart.max-file-size=10MB

# File upload Constant for Application
com.example.upload.path=c:\\upload

# Restart WAS(Web Application Server)
spring.devtools.livereload.enabled=true

#log level: ALL < DEBUG < INFO < WARN < ERROR < FATAL < OFF
#logging.level.org.springframework.security.web=trace
#logging.level.com.example=debug

# google social login
spring.profiles.include=oauth





